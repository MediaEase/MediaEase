name: Update Submodules and Create Release

on:
  repository_dispatch:
    types: [harmonyui-release, zen-release]

jobs:
  update-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0
          ref: ${{ github.event.client_payload.ref }}

      - name: Update Submodule to Latest Commit
        id: update_submodule
        run: |
          set -e
          BRANCH_NAME="${{ github.event.client_payload.ref }}"
          MODULE_NAME="${{ github.event.client_payload.submodule }}"
          COMMIT_SHA="${{ github.event.client_payload.sha }}"
          git submodule update --init "$MODULE_NAME"
          cd "$MODULE_NAME"
          git fetch origin "$BRANCH_NAME"
          git checkout "$COMMIT_SHA"
          cd ..
          git add "$MODULE_NAME"
          echo "module_name=$MODULE_NAME" >> $GITHUB_OUTPUT
          echo "commit_message=chore: update $MODULE_NAME submodule to $BRANCH_NAME at $COMMIT_SHA" >> $GITHUB_OUTPUT

      - name: Commit and Push Changes
        uses: EndBug/add-and-commit@v9
        with:
          author_name: "tomcdj71"
          author_email: "contact.tomc@yahoo.fr"
          message: ${{ steps.update_submodule.outputs.commit_message }}
          add: ${{ steps.update_submodule.outputs.module_name }}
          push: true
          pull: "--rebase --autostash"

      - name: Retrieve Submodule Tags and Release Notes
        id: retrieve_tags
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ZEN_DIR="zen"
          ZEN_TAG=$(git -C "$ZEN_DIR" describe --tags --abbrev=0)
          ZEN_RELEASE_URL="https://api.github.com/repos/MediaEase/Zen/releases/tags/$ZEN_TAG"
          ZEN_RELEASE_NOTES=$(curl -s -H "Authorization: token $GITHUB_TOKEN" "$ZEN_RELEASE_URL" | jq -r '.body')
          mkdir -p changelogs
          echo "$ZEN_RELEASE_NOTES" > "changelogs/zen_${ZEN_TAG}.md"
          echo "ZEN_VERSION=$ZEN_TAG" >> $GITHUB_ENV
          echo "ZEN_RELEASE_URL=$ZEN_RELEASE_URL" >> $GITHUB_ENV
          echo "ZEN_RELEASE_NOTES=$(cat changelogs/zen_${ZEN_TAG}.md)" >> $GITHUB_ENV
          HARMONYUI_DIR="harmonyui"
          HARMONYUI_TAG=$(git -C "$HARMONYUI_DIR" describe --tags --abbrev=0)
          HARMONYUI_RELEASE_URL="https://api.github.com/repos/MediaEase/HarmonyUI/releases/tags/$HARMONYUI_TAG"
          HARMONYUI_RELEASE_NOTES=$(curl -s -H "Authorization: token $GITHUB_TOKEN" "$HARMONYUI_RELEASE_URL" | jq -r '.body')
          echo "$HARMONYUI_RELEASE_NOTES" > "changelogs/harmonyui_${HARMONYUI_TAG}.md"
          echo "HARMONYUI_VERSION=$HARMONYUI_TAG" >> $GITHUB_ENV
          echo "HARMONYUI_RELEASE_URL=$HARMONYUI_RELEASE_URL" >> $GITHUB_ENV
          echo "HARMONYUI_RELEASE_NOTES=$(cat changelogs/harmonyui_${HARMONYUI_TAG}.md)" >> $GITHUB_ENV

      - name: Build Global Release Notes
        id: build_release_notes
        run: |
          ZEN_VERSION="${ZEN_VERSION}"
          HARMONYUI_VERSION="${HARMONYUI_VERSION}"
          ZEN_RELEASE_NOTES="${ZEN_RELEASE_NOTES}"
          HARMONYUI_RELEASE_NOTES="${HARMONYUI_RELEASE_NOTES}"
          ZEN_RELEASE_URL="${ZEN_RELEASE_URL}"
          HARMONYUI_RELEASE_URL="${HARMONYUI_RELEASE_URL}"
          echo "# Global Release Notes" > CHANGELOG.md
          echo "This release includes updates from the following components:" >> CHANGELOG.md
          echo "- [MediaEase/Zen](${ZEN_RELEASE_URL}) - Version ${ZEN_VERSION}" >> CHANGELOG.md
          echo "- [MediaEase/HarmonyUI](${HARMONYUI_RELEASE_URL}) - Version ${HARMONYUI_VERSION}" >> CHANGELOG.md
          echo "" >> CHANGELOG.md
          if [ -n "$ZEN_RELEASE_NOTES" ]; then
            echo "## MediaEase/Zen" >> CHANGELOG.md
            echo "$ZEN_RELEASE_NOTES" >> CHANGELOG.md
            echo "" >> CHANGELOG.md
          fi
          if [ -n "$HARMONYUI_RELEASE_NOTES" ]; then
            echo "## MediaEase/HarmonyUI" >> CHANGELOG.md
            echo "$HARMONYUI_RELEASE_NOTES" >> CHANGELOG.md
            echo "" >> CHANGELOG.md
          fi
          echo "## MediaEase/MediaEase" >> CHANGELOG.md
          LAST_TAG=$(git describe --tags --abbrev=0 || echo "")
          if [ -n "$LAST_TAG" ]; then
            echo "Changes since last tag ($LAST_TAG):" >> CHANGELOG.md
            git log "$LAST_TAG"..HEAD --pretty=format:"- %s" >> CHANGELOG.md
          else
            echo "Initial release." >> CHANGELOG.md
          fi
          echo "RELEASE_NOTES<<EOF" >> $GITHUB_ENV
          cat CHANGELOG.md >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Create Release
        uses: actions/create-release@v1
        with:
          tag_name: ${{ github.event.client_payload.ref }}
          release_name: ${{ github.event.client_payload.ref }}
          body: "${{ env.RELEASE_NOTES }}"
          draft: false
          prerelease: ${{ contains(github.event.client_payload.ref, 'develop') }}
        env:
          GITHUB_TOKEN: ${{ secrets.MEDIAEASE_ACCESS_TOKEN }}
